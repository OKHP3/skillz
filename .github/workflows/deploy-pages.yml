name: Deploy Skillz Forge to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'forge/**'
      - '.github/workflows/deploy-pages.yml'
      - 'abrahamic/**'
      - 'community/**'
      - 'lifetrkr/**'
      - 'linkedin/**'
      - 'mermaid/**'
      - 'notion/**'
      - 'process-capture/**'
      - 'refolddec/**'
      - 'universal/**'
      - 'AGENTS.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: forge/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: forge
        run: pnpm install --frozen-lockfile

      - name: Generate skill catalog
        working-directory: forge
        run: node scripts/build-catalog.js

      - name: Verify catalog provenance
        working-directory: forge
        run: |
          node -e "
            const c = require('./src/data/catalog.json');
            if (!c.skillCount || c.skillCount === 0) { console.error('Empty catalog'); process.exit(1); }
            if (!c.sourceRepository) { console.error('Missing sourceRepository'); process.exit(1); }
            console.log('Catalog OK:', c.skillCount, 'skills,', c.familyCount, 'families');
            console.log('Source:', c.sourceRepository, '@', c.sourceCommit ?? 'unknown');
          "

      - name: Type-check and build
        working-directory: forge
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: forge/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
