name: Deploy Skillz Forge to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'forge/**'
      - '.github/workflows/deploy-pages.yml'
      - 'abrahamic/**'
      - 'community/**'
      - 'lifetrkr/**'
      - 'linkedin/**'
      - 'mermaid/**'
      - 'notion/**'
      - 'process-capture/**'
      - 'refolddec/**'
      - 'agent-foundry/**'
      - 'universal/**'
      - 'AGENTS.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: forge/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: forge
        run: pnpm install --frozen-lockfile

      - name: Generate skill catalog
        working-directory: forge
        run: node scripts/build-catalog.js

      - name: Verify catalog provenance
        working-directory: forge
        run: |
          node -e "
            const c = require('./src/data/catalog.json');
            let ok = true;
            if (!c.skillCount || c.skillCount === 0) { console.error('FAIL: Empty catalog'); ok = false; }
            if (!c.sourceRepository) { console.error('FAIL: Missing sourceRepository'); ok = false; }
            if (!c.familyCount || c.familyCount === 0) { console.error('FAIL: Missing or zero familyCount'); ok = false; }
            if (!c.sourceCommit) { console.error('FAIL: Missing sourceCommit'); ok = false; }
            if (!c.sourceRef || c.sourceRef === 'HEAD') { console.error('FAIL: sourceRef is HEAD or missing (detached HEAD in CI)'); ok = false; }
            if (!ok) process.exit(1);
            console.log('Catalog OK:', c.skillCount, 'skills,', c.familyCount, 'families');
            console.log('Source:', c.sourceRepository, '@', c.sourceRef, c.sourceCommit);
          "

      - name: Type-check and build
        working-directory: forge
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: forge/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
