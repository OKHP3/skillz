name: Extract skillz scaffold

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip to repo root
        run: |
          if [ ! -f OKHP3-skillz.zip ]; then
            echo "No zip found, nothing to do."
            exit 0
          fi
          mkdir -p /tmp/extracted
          unzip -o OKHP3-skillz.zip -d /tmp/extracted
          shopt -s dotglob
          cp -r /tmp/extracted/skillz/* .
          shopt -u dotglob
          rm -rf /tmp/extracted
          rm -f OKHP3-skillz.zip
          chmod +x mermaid/okhp3-mermaid-publish/references/render-pipeline.sh

      - name: Remove this workflow file
        run: rm -f .github/workflows/extract-scaffold.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "Extract skillz scaffold from zip [skip ci]"
          git push
